name: eval
on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  golden:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"
      - name: Install
        run: bun install
      # CI 沙箱用 docker-fallback（GH Actions 装 nono 复杂，fallback 更稳）；
      # docker 在 ubuntu-latest 默认可用。
      - name: Golden eval (real provider)
        # 真实 golden 需 provider key（仓库 secret 注入）；缺 key 则 harness 自跳过（exit 2）。
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ZHIPU_API_KEY" ] && [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "无 provider key — 跑 mock 机制验证（真实 golden 红线需配 secret）"
            ARCLIGHT_EVAL_MOCK=1 bun evals/runner/run.ts
          else
            bun evals/runner/run.ts
          fi
      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-summary
          path: evals/results/summary.json
      - name: PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const s = JSON.parse(fs.readFileSync('evals/results/summary.json','utf8'));
              const body = `### Golden eval (${s.mode})\n通过 **${s.passed}/${s.scored}**（跳过 ${s.skipped}）`;
              github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            } catch (e) { core.info('no summary'); }
