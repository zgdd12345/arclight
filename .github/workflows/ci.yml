name: ci
on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"
      - name: Install
        run: bun install
      - name: Rebuild native (node-pty)
        run: cd packages/core/node_modules/node-pty && npx node-gyp rebuild || true
      - name: Biome check
        run: bunx biome check .
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Unit tests (vitest)
        run: bunx vitest run
      - name: Core + integration tests (bun)
        run: bun run test:core
      - name: Native smoke test
        # docker-fallback 沙箱在 GH Actions 可用；nono 缺失自动降级（"全绿或明确降级"）
        run: bun run smoke
      - name: Set up conda (Python gate)
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.12"
          activate-environment: arclight
          auto-activate-base: false
      - name: Install Python deps
        shell: bash -el {0}
        run: pip install -e "packages/core-py[dev]"
      - name: Contract drift gate
        shell: bash -el {0}
        run: bun run check:contract
      - name: Python checks
        shell: bash -el {0}
        run: bun run check:py
      - name: Proxy tests (bun + cross-runtime e2e)
        shell: bash -el {0}
        run: cd packages/proxy && bun test
